project:
  name: "SaniSight AI"
  version: "2.0"
  data_path: "data/processed/water_quality.csv"
  geojson_path: "data/raw/regions.geojson"
  model_dir: "models"

features:
  - kepadatan_penduduk
  - pct_tanpa_sanitasi
  - pct_tanpa_air_bersih
  - volume_sampah_harian
  - curah_hujan_mm
  - indeks_kualitas_air
  - jumlah_faskes_per_1000

target: "risk_class"

risk_labels:
  0: "Risiko Rendah"
  1: "Risiko Sedang"
  2: "Risiko Tinggi"

risk_colors:
  0: "#10b981"
  1: "#f59e0b"
  2: "#ef4444"

training:
  test_size: 0.2
  random_state: 42
  logistic:
    max_iter: 500
  xgboost:
    n_estimators: 250
    max_depth: 4
    learning_rate: 0.08
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
  dbscan:
    eps: 0.7
    min_samples: 6
